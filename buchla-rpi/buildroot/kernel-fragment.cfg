# Force display and audio drivers built-in (avoid module loading issues)

# DRM core
CONFIG_DRM=y
CONFIG_DRM_KMS_HELPER=y
CONFIG_DRM_GEM_DMA_HELPER=y
CONFIG_DRM_GEM_SHMEM_HELPER=y
CONFIG_DRM_DISPLAY_HELPER=y
CONFIG_DRM_DISPLAY_DP_HELPER=y
CONFIG_DRM_DISPLAY_HDMI_HELPER=y
CONFIG_DRM_DISPLAY_HDMI_STATE_HELPER=y

# CEC (required by vc4 HDMI)
CONFIG_CEC_CORE=y
CONFIG_MEDIA_CEC_SUPPORT=y
CONFIG_MEDIA_SUPPORT=y

# Sound core (required by vc4 HDMI audio)
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_PCM=y
CONFIG_SND_SOC=y
CONFIG_SND_DMAENGINE_PCM=y

# VC4 display driver
CONFIG_DRM_VC4=y

# BCM2835 headphone audio
CONFIG_SND_BCM2835=y
CONFIG_SND_BCM2835_SOC_I2S=y

# Framebuffer console on DRM
CONFIG_DRM_FBDEV_EMULATION=y

# ALSA sequencer (needed by RtMidi for MIDI input)
CONFIG_SND_RAWMIDI=y
CONFIG_SND_SEQUENCER=y
CONFIG_SND_SEQ_MIDI=y
CONFIG_SND_SEQ_MIDI_EVENT=y

# USB MIDI (M-Audio Keystation etc.)
CONFIG_SND_USB_AUDIO=y
